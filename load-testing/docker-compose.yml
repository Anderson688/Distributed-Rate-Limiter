services:
  # The Redis Host
  redis-host:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  # The App Server
  app-server:
    build: sample_app
    ports:
      - "8081:8080" # CHANGED: Maps your Mac's 8081 to the container's 8080
    environment:
      - SPRING_DATA_REDIS_HOST=redis-host
      - SPRING_DATA_REDIS_PORT=6379
      - RATELIMITER_STORE_TYPE=redis
    depends_on:
      - redis-host

  # The Load Generator
  load-generator:
    image: alpine:latest
    depends_on:
      - app-server
    volumes:
      - ./:/scripts